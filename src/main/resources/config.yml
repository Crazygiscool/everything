# Everything Plugin Configuration
# Auto-update: download new plugin builds on release (Modrinth).
# Set to false to disable automatic updating.
auto-update: true
# Join / Leave Messages
# Use 'adventure api minicolors' for color codes.
# Use built-in placeholders (e.g., %player_name%, %player_displayname%, %player_world%).
messages:
  # Set to "" (empty string) to disable a specific message.
  join: "<yellow>%player_name% joined the game."
  leave: "<yellow>%player_name% left the game."
  first-join: "<green>Welcome %player_name% to the server for the first time!"

# Define the chat format here.
# Use adventureAPI color codes with <gray> for gray.
# Use <player> where you want the player's name/displayname to appear.
# Use <message> where you want the player's message to appear.
# Built-in placeholders: %player_name%, %player_displayname%, %player_world%, etc.
chat:
  format: "<prefix><player><suffix> <gray>» <white><message>"
  # Fallback prefix/suffix used when neither LuckPerms nor stored data provides one.
  # Supports legacy '&' color codes. Set to "" to disable.
  default-prefix: ""
  default-suffix: ""

# Random Teleport (/rtp) settings
rtp:
  center-x: 0
  center-z: 0
  min-radius: 500
  max-radius: 5000
  cooldown-seconds: 60
  max-attempts: 20

# Block Logging & Rollback (/rollback, /lookup, /inspect)
blocklog:
  # Master switch for the entire feature.
  enabled: true
  # Log natural changes (explosions, fire, block burn/fade, endermen, falling blocks).
  log-natural: true
  # Log fluid spread/flow changes (lava/water). Can be very spammy, keep off by default.
  log-fluid: false
  # Entries older than this many days are eligible for pruning via /lb prune.
  # Set prune-on-startup: true to prune automatically on plugin enable.
  max-retention-days: 30
  # Auto-prune log entries older than max-retention-days on plugin enable.
  prune-on-startup: false
  # Log tree/crop/mushroom/vine/amethyst/chorus/bamboo growth.
  log-growth: true
  # Log piston-extended/retracted block movement.
  log-piston: true
  # Log nether/end portal generation.
  log-portal: true
  # Log player bucket fill/empty (liquid source placement).
  log-bucket: true
  # Log sign text/color/glow/wax edits.
  log-sign-edit: true
  # Write block changes to the database off the main thread (batched).
  # Keeps TPS stable under heavy logging load.
  async: true
  # Per-world filtering for block logging.
  # mode: blacklist -> skip the listed worlds
  # mode: whitelist -> log ONLY the listed worlds
  worlds:
    mode: blacklist
    list: []
  # Material used for the inspect wand tool.
  inspect-wand-material: "STICK"
  # Max number of history entries shown per block in the inspect wand.
  max-history-per-block: 25
  # Max blocks a single /rollback may affect (safety cap, 0 = unlimited).
  max-rollback-blocks: 10000
  # Log player interactions with doors, buttons, levers, containers, etc.
  log-interact: true
  # Log items taken from/placed into containers (chests, barrels, hoppers, etc.).
  log-container: true
  # Log items crafted by players.
  log-craft: true
  # Log villager trades.
  log-trade: true
  # Log entity kills and deaths.
  log-entity-death: true
  # Max blocks a single /rollback may affect per world (safety cap).
  max-rollback-blocks-per-world: 10000
  # Enable WorldEdit/FAWE selection integration for lookups and rollbacks.
  worldedit-integration: true

# ===========================
# Particle Effects
# ===========================
particles:
  # Master switch — disable all particles globally
  enabled: true
  # Per-command toggles
  commands:
    tp: true
    tpa: true
    tpaccept: true
    tpdeny: true
    home: true
    sethome: true
    spawn: true
    setspawn: true
    warp: true
    rtp: true
    pay: true
    balance: true
    eco: true
    gmc: true
    gms: true
    gmsp: true
    gma: true
    god: true
    kill: true
    msg: true
    reply: true
    report: true
    namecolor: true
    stats: true
    maintenance: true
    everything: true

# ===========================
# Teleport Settings
# ===========================
teleport:
  # Warmup delay (seconds) before teleport completes. 0 = instant.
  warmup-seconds:
    home: 3
    sethome: 0
    spawn: 0
    setspawn: 0
    warp: 2
    rtp: 0
    tp: 0
    tpa: 0
    tpaccept: 0

  # Cooldown (seconds) after teleport before it can be used again. 0 = no cooldown.
  cooldown-seconds:
    home: 0
    sethome: 0
    spawn: 0
    setspawn: 0
    warp: 0
    rtp: 60
    tp: 0
    tpa: 0
    tpaccept: 0

  # Cancel warmup if player moves (even 1 block). Only applies when warmup > 0.
  cancel-on-move:
    home: true
    sethome: false
    spawn: false
    setspawn: false
    warp: true
    rtp: false
    tp: false
    tpa: false
    tpaccept: false

  # Verify destination is safe (not inside block, not in lava). Only applies to non-random teleports.
  check-safety:
    home: true
    sethome: false
    spawn: true
    setspawn: false
    warp: true
    tp: false
    tpa: false
    tpaccept: false
    rtp: false

  # TPA request timeout (seconds). Requests older than this are auto-denied.
  tpa-timeout-seconds: 60

  # Warmup messages — supports placeholders: %time%, %destination%, %player%
  messages:
    warmup-start: "<yellow>Teleporting in <gold>%time%<yellow> seconds... Don't move!"
    warmup-tick: "<yellow>Teleporting in <gold>%time%<yellow> seconds..."
    warmup-cancel: "<red>Teleport cancelled — you moved!"
    warmup-complete: "<green>Teleported!"
    cooldown: "<red>You must wait <gold>%time%<red> seconds before using this again."
    safety-failed: "<red>Destination is not safe (inside block or hazard). Try again."
    tpa-expired: "<red>Your TPA request to <gold>%player%<red> has expired."
    tpa-expired-target: "<red>TPA request from <gold>%player%<red> has expired."
