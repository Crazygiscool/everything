server-name: "Crazypixel"
server-link: "https://crazyg.is-a.dev"
server-author: "Crazygiscool"
server-description: "A fun Minecraft server with lots of features!"

categories:
  general:
    name: "General Commands"
    icon: "BOOK"
    type: "commands"
    description: "All commands available to you"

  warps:
    name: "Warps"
    icon: "ENDER_PEARL"
    type: "warps"
    description: "Teleport around the server"

  economy:
    name: "Economy"
    icon: "GOLD_INGOT"
    type: "economy"
    description: "Player balances"

  blocklog:
    name: "Block Logging & Rollback"
    icon: "COMPASS"
    type: "blocklog"
    description: "Inspect and revert block changes"
    commands:
      - "/inspect - Toggle the inspect wand"
      - "/lookup <player|*> [radius] [time] - Preview block changes"
      - "/rollback <player|*> [radius] [time] [-y] - Revert block changes"
      - "/lb prune <days> - Delete old log entries"
